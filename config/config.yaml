# Smart Scheduler 配置文件
# Smart Scheduler Configuration

scheduler:
  behavior:
    min_interval_minutes: 10
    max_accounts_per_fetch: 5
    random_delay_seconds: [30, 120]
  
  time_weights:
    0: 0.1
    1: 0.1
    2: 0.1
    3: 0.1
    4: 0.1
    5: 0.1
    6: 0.2
    7: 0.3
    8: 0.5
    9: 0.7
    10: 0.9
    11: 0.8
    12: 0.6
    13: 0.7
    14: 0.8
    15: 0.7
    16: 0.6
    17: 0.5
    18: 0.4
    19: 0.5
    20: 0.8
    21: 0.9
    22: 0.7
    23: 0.3
  
  priority_weights:
    3: 1.0
    2: 0.7
    1: 0.4

learning:
  enabled: true
  profile_update_frequency: "daily"
  
  priority_adjustment:
    positive_threshold: 3
    negative_threshold: 3
  
  frequency_adjustment:
    high_frequency_threshold: 5
    low_frequency_threshold: 7

output:
  daily_summary_time: "22:00"
  weekly_cross_validation_day: "sunday"
  log_retention_days: 30

categories:
  core:
    description: "核心大佬（全球 AI 领袖）"
    default_priority: 3
    default_frequency: "medium"
    fetch_frequency: "daily"
  
  cn_influencer:
    description: "中文大佬（中文 AI 圈）"
    default_priority: 2
    default_frequency: "medium"
    fetch_frequency: "daily"
  
  en_influencer:
    description: "英文大佬（英文 AI 实践者）"
    default_priority: 2
    default_frequency: "medium"
    fetch_frequency: "daily"
  
  self_follow:
    description: "自己关注的账号"
    default_priority: 2
    default_frequency: "medium"
    fetch_frequency: "daily"
  
  institution:
    description: "机构账号（AI 公司/研究机构）"
    default_priority: 2
    default_frequency: "medium"
    fetch_frequency: "daily"

cross_validation:
  enabled: true
  frequency: "weekly"
  day: "sunday"
  time: "22:00"
  min_common_follows: 3
  min_followers: 10000
  sample_size: 5
